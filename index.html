<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produktif Id - Premium Link</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- Reset & Base --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #3E2723;
            padding: 20px;
        }

        /* --- Kartu Link --- */
        .link-card {
            background-color: #FFF8E1;
            width: 100%;
            max-width: 400px;
            padding: 40px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            transform: rotateX(2deg) rotateY(-2deg);
            transition: transform 0.3s ease;
        }
        
        .link-card:hover {
             transform: rotateX(0deg) rotateY(0deg) translateY(-5px);
        }

        /* Tombol Bagikan Kanan Atas (Dalam Kotak) */
        .share-main-trigger {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #8D6E63;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }

        .share-main-trigger:hover {
            background: #A1887F;
            transform: scale(1.1);
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #8D6E63;
            margin-bottom: 15px;
        }

        .brand-name {
            font-size: 22px;
            font-weight: 600;
            color: #5D4037;
            margin-bottom: 25px;
        }

        /* --- Container Link --- */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .link-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .link-item {
            display: flex;
            align-items: center;
            flex-grow: 1;
            background-color: #8D6E63;
            color: #FFFFFF;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 400;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Animasi Kursor (Hover) */
        .link-item:hover {
            background-color: #A1887F;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* Efek Shimmer */
        .link-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.6s;
        }

        .link-item:hover::after {
            left: 100%;
        }

        .link-item i:first-child { margin-right: 12px; transition: 0.3s; }
        .link-item:hover i:first-child { transform: scale(1.2) rotate(-10deg); }

        /* Tombol Titik Tiga */
        .btn-more {
            position: absolute;
            right: 15px;
            color: white;
            cursor: pointer;
            padding: 5px;
            z-index: 5;
            transition: 0.3s;
        }

        /* --- Dropdown Menu Bagikan --- */
        .share-dropdown {
            display: none;
            position: absolute;
            top: 55px;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 200px;
            z-index: 100;
            overflow: hidden;
            border: 1px solid #eee;
            text-align: left;
        }

        .share-dropdown.active { display: block; animation: fadeIn 0.2s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .share-dropdown a, .share-dropdown div {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #f9f9f9;
        }

        .share-dropdown a:hover, .share-dropdown div:hover { background: #f5f5f5; }
        .share-dropdown i { margin-right: 12px; width: 20px; text-align: center; }

        /* Icon Colors */
        .fa-whatsapp { color: #25D366; }
        .fa-tiktok { color: #000; }
        .fa-envelope { color: #EA4335; }
        .fa-instagram { color: #E4405F; }
        .fa-facebook { color: #1877F2; }
        .fa-link { color: #8D6E63; }

        /* --- Social Icons Bawah --- */
        .social-icons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-top: 15px;
            border-top: 1px solid #D7CCC8;
        }

        .social-icon { font-size: 26px; color: #8D6E63; transition: 0.3s; }
        .social-icon:hover { transform: scale(1.2); }

        /* --- Footer Produktif ID --- */
        .footer-brand {
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #FFF8E1;
            text-decoration: none;
            font-size: 13px;
        }

        .logo-bulat {
            width: 28px; height: 28px;
            background: #8D6E63;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border: 2px solid #FFF8E1;
        }
    </style>
</head>
<body>

    <div class="link-card">
        <div class="share-main-trigger" onclick="toggleMenu(event, 'mainShare')">
            <i class="fa-solid fa-share-nodes"></i>
        </div>
        
        <div id="mainShare" class="share-dropdown" style="top: 70px; right: 20px;">
            <a href="https://wa.me/?text=Cek ini: http://linkbio.com" target="_blank"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
            <a href="https://www.tiktok.com/" target="_blank"><i class="fa-brands fa-tiktok"></i> TikTok</a>
            <a href="mailto:?subject=Link Bio&body=Cek link ini http://linkbio.com"><i class="fa-solid fa-envelope"></i> Gmail</a>
            <a href="https://www.instagram.com/" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
            <a href="https://www.facebook.com/" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook</a>
            <div onclick="copyLink()"><i class="fa-solid fa-link"></i> Salin Link</div>
        </div>

        <img src="logo produktif id.png" alt="Profil" class="profile-img">
        <h1 class="brand-name">Produktif Id</h1>

        <div class="links-container">
            <div class="link-wrapper">
                <a href="https://Lynk.id/produktifid" class="link-item">
                    <i class=""></i> <span>My Product</span>
                </a>
                <i class="fa-solid fa-ellipsis-vertical btn-more" onclick="toggleMenu(event, 'menu1')"></i>
                
                <div id="menu1" class="share-dropdown">
                    <a href="https://wa.me/?text=https://Lynk.id/produktifid" target="_blank"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                    <a href="mailto:?subject=Cek Link Bio Ini&body=Halo, cek link menarik ini: https://Lynk.id/produktifid" target="_blank">
                        <i class="fa-solid fa-envelope"></i> Gmail</a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u=https://Lynk.id/produktifid" target="_blank">
                        <i class="fa-brands fa-facebook"></i> Facebook</a>
                    <div onclick="copyLink()"><i class="fa-solid fa-link"></i> Salin Link</div>
                </div>
            </div>

            <div class="link-wrapper">
                <a href="#" class="link-item">
                    <i class=""></i> <span>Order produk lainnya disini yaa</span>
                </a>
                <i class="fa-solid fa-ellipsis-vertical btn-more" onclick="toggleMenu(event, 'menu2')"></i>
                
                <div id="menu2" class="share-dropdown">
                    <a href="https://wa.me/?text=Kalau mau order disini yaa 087873667982" target="_blank"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                </div>
            </div>
        </div>

        <div class="social-icons-container">
            <a href="https://wa.me/6287873667982" class="social-icon"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://www.tiktok.com/@produktifid" class="social-icon"><i class="fa-brands fa-tiktok"></i></a>
            <a href="https://www.instagram.com/produktifid_76" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </div>

    <a href="#" class="footer-brand">
        <span>by: produktif id</span>
    </a>

    <script>
        function toggleMenu(event, menuId) {
            event.stopPropagation();
            const allMenus = document.querySelectorAll('.share-dropdown');
            allMenus.forEach(menu => {
                if(menu.id !== menuId) menu.classList.remove('active');
            });
            document.getElementById(menuId).classList.toggle('active');
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link berhasil disalin ke clipboard!");
        }

        window.onclick = function() {
            document.querySelectorAll('.share-dropdown').forEach(m => m.classList.remove('active'));
        }
    </script>
</body>
</html>
